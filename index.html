        <script type="module">

            import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
            import { getAuth } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
            import { getDatabase, ref, set, onValue, onDisconnect, push } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

            const firebaseConfig = {
                apiKey: "AIzaSyB28UEf4D7P_HEPTPJ2LFW1qNX6eClSiV8",
                authDomain: "total-calculation-28107.firebaseapp.com",
                projectId: "total-calculation-28107",
                storageBucket: "total-calculation-28107.firebasestorage.app",
                messagingSenderId: "511218423499",
                appId: "1:511218423499:web:e1611005d8586d89c22d4e",
                databaseURL: "https://total-calculation-28107-default-rtdb.firebaseio.com" 
            };

            const app = initializeApp(firebaseConfig);
            const db = getDatabase(app); // これで「db」を使ってオンライン操作ができるようになる

            const avatarOptions = [
                'https://api.dicebear.com/7.x/avataaars/svg?seed=1',
                'https://api.dicebear.com/7.x/avataaars/svg?seed=2',
                'https://api.dicebear.com/7.x/avataaars/svg?seed=3',
                'https://api.dicebear.com/7.x/avataaars/svg?seed=4',
                'https://api.dicebear.com/7.x/avataaars/svg?seed=5',
                'https://api.dicebear.com/7.x/avataaars/svg?seed=6',
                'https://api.dicebear.com/7.x/avataaars/svg?seed=7',
                'https://api.dicebear.com/7.x/avataaars/svg?seed=8'
            ];

            let currentMode = 'offline';
            let isOnlineConnected = false;
            let isRendering = false;
            let saveTimeout;
            let currentUserId = null;
            let users = {};

            window.debouncedSaveData = function() {
                clearTimeout(saveTimeout);
                saveTimeout = setTimeout(() => saveData(), 500);
            }
            
            // オンライン接続と同期
            window.connectOnline = function() {
                const roomId = document.getElementById('room-id').value;
                const roomPw = document.getElementById('room-pw').value;
                if (!roomId || !roomPw) return alert("入力してください");

                const roomRef = ref(db, 'rooms/' + roomId);
                
                onValue(roomRef, (snapshot) => {
                    const data = snapshot.val();
                    const overlay = document.getElementById('room-login-overlay');
                    const roomPwInput = document.getElementById('room-pw');
                    const pwError = document.getElementById('pw-error');
                    if (data) {
                        if (data.password === roomPw) {
                            roomPwInput.style.borderColor = '';
                            pwError.style.display = 'none';
                            overlay.style.display = 'none';
                            // ユーザーID生成と登録
                            if (!currentUserId) {
                                currentUserId = localStorage.getItem('userId') || push(ref(db, 'rooms/' + roomId + '/users')).key;
                                localStorage.setItem('userId', currentUserId);
                                const userName = generateRandomName();
                                const userAvatar = generateRandomAvatar();
                                const userRef = ref(db, 'rooms/' + roomId + '/users/' + currentUserId);
                                set(userRef, { name: userName, avatar: userAvatar });
                                onDisconnect(userRef).remove();
                            }
                            renderFromOnline(data.content, data.logs);
                            // ユーザーリスト監視
                            const usersRef = ref(db, 'rooms/' + roomId + '/users');
                            onValue(usersRef, (usersSnapshot) => {
                                users = usersSnapshot.val() || {};
                                renderUserList();
                            });
                        } else {
                            roomPwInput.style.borderColor = '#d00';
                            pwError.textContent = 'パスワードが違います';
                            pwError.style.display = 'block';
                        }
                    } else {
                        // 新規作成
                        roomPwInput.style.borderColor = '';
                        pwError.style.display = 'none';
                        set(roomRef, { password: roomPw, content: [], logs: [], users: {} }).then(() => {
                            overlay.style.display = 'none';
                            // ユーザーID生成と登録
                            if (!currentUserId) {
                                currentUserId = localStorage.getItem('userId') || push(ref(db, 'rooms/' + roomId + '/users')).key;
                                localStorage.setItem('userId', currentUserId);
                                const userName = generateRandomName();
                                const userAvatar = generateRandomAvatar();
                                const userRef = ref(db, 'rooms/' + roomId + '/users/' + currentUserId);
                                set(userRef, { name: userName, avatar: userAvatar });
                                onDisconnect(userRef).remove();
                            }
                            renderFromOnline([], []);
                            // ユーザーリスト監視
                            const usersRef = ref(db, 'rooms/' + roomId + '/users');
                            onValue(usersRef, (usersSnapshot) => {
                                users = usersSnapshot.val() || {};
                                renderUserList();
                            });
                        });
                    }
                });
            };

            window.setMode = function(mode) {
                currentMode = mode;
                localStorage.setItem('currentMode', mode);
                document.getElementById('mode-selector-overlay').style.display = 'none';
                if (mode === 'online') {
                    document.getElementById('room-login-overlay').style.display = 'flex';
                    isOnlineConnected = false;
                } else {
                    document.getElementById('room-login-overlay').style.display = 'none';
                    isOnlineConnected = false;
                    loadDataFromLocal();
                    // オフライン時はユーザーリストをクリア
                    document.getElementById('user-list').innerHTML = '';
                    users = {};
                    currentUserId = null;
                }
            };
            

           // 保存時にFirebaseへ飛ばす
            window.saveData = function() {
                // 共通：画面上の入力データを集める
                const rows = Array.from(document.querySelectorAll(".input-row")).map(row => ({
                    color: row.querySelector(".row-color-picker").value,
                    label: row.querySelector(".label-in").value,
                    num: row.querySelector(".num-in").value,
                    memo: row.querySelector(".memo-in").value
                }));

                // ① 自分のパソコン（ローカル）に保存（バックアップ用）
                localStorage.setItem('proCalcV15_data', JSON.stringify(rows));

                // ② オンライン（Firebase）に保存（共有用）
                if (currentMode === 'online' && isOnlineConnected && !isRendering) {
                    const roomId = document.getElementById('room-id').value;
                    if (roomId) {
                        set(ref(db, 'rooms/' + roomId + '/content'), rows);
                    }
                }
            };

            window.loadDataFromLocal = function() {
                const savedData = JSON.parse(localStorage.getItem('proCalcV15_data'));
                const area = document.getElementById("input-area");
                area.innerHTML = "";
                if (savedData && savedData.length > 0) {
                    savedData.forEach(d => addForm(d.num, d.memo, d.label, d.color));
                } else {
                    addForm();
                }
                refreshLogList();
                calculateAll(false);
            };

            window. renderFromOnline = function(content, logs) {
                isRendering = true;
                isOnlineConnected = true;
                const area = document.getElementById("input-area");
                // 現在のフォーカスと入力値を保存
                const activeElement = document.activeElement;
                const currentInputs = Array.from(area.querySelectorAll('.input-row')).map(row => ({
                    color: row.querySelector('.row-color-picker')?.value || '',
                    label: row.querySelector('.label-in')?.value || '',
                    num: row.querySelector('.num-in')?.value || '',
                    memo: row.querySelector('.memo-in')?.value || ''
                }));
                area.innerHTML = "";
                if (content) {
                    content.forEach((d, index) => {
                        const saved = currentInputs[index] || {};
                        const isLast = index === content.length - 1;
                        addForm(saved.num || d.num, saved.memo || d.memo, saved.label || d.label, saved.color || d.color, null, !isLast);
                    });
                } else {
                    addForm();
                }
                // フォーカスを復元
                if (activeElement && activeElement.tagName === 'INPUT' && activeElement.closest('#input-area')) {
                    const rows = area.querySelectorAll('.input-row');
                    const rowIndex = Array.from(activeElement.closest('.input-row').parentNode.children).indexOf(activeElement.closest('.input-row'));
                    if (rows[rowIndex]) {
                        const inputs = rows[rowIndex].querySelectorAll('input');
                        const inputIndex = ['row-color-picker', 'label-in', 'num-in', 'memo-in'].indexOf(activeElement.className);
                        if (inputs[inputIndex]) {
                            inputs[inputIndex].focus();
                            if (activeElement.selectionStart !== undefined) {
                                inputs[inputIndex].setSelectionRange(activeElement.selectionStart, activeElement.selectionEnd);
                            }
                        }
                    }
                }
                if (logs) {
                    localStorage.setItem('proCalcV15_logs', JSON.stringify(logs));
                }
                refreshLogList();
                calculateAll(false);
                isRendering = false;
            }



            let draggedItem = null, draggedLog = null, afterElement = null, afterLogElement = null, placeholder = null;

            window.confirmAction = function(msg, callback) {
                document.getElementById('modal-msg').innerText = msg;
                document.getElementById('custom-modal-overlay').style.display = 'flex';
                setTimeout(() => document.getElementById('custom-modal').classList.add('open'), 10);
                
                const execBtn = document.getElementById('modal-exec-btn');
                execBtn.onclick = null;
                execBtn.onclick = (event) => {
                    event.stopPropagation();
                    callback();
                    closeModal(false);
                };
            }

            window.closeModal = function() {
                document.getElementById('custom-modal').classList.remove('open');
                setTimeout(() => { document.getElementById('custom-modal-overlay').style.display = 'none'; }, 200);
            }

            window.openSettingsModal = function() {
                document.getElementById('settings-modal-overlay').style.display = 'flex';
            }

            window.closeSettingsModal = function() {
                document.getElementById('settings-modal-overlay').style.display = 'none';
            }

            window.openAvatarSelector = function() {
                const optionsDiv = document.getElementById('avatar-options');
                optionsDiv.innerHTML = '';
                avatarOptions.forEach(avatar => {
                    const img = document.createElement('img');
                    img.src = avatar;
                    img.style.width = '50px';
                    img.style.height = '50px';
                    img.style.borderRadius = '25px';
                    img.style.cursor = 'pointer';
                    img.style.border = '2px solid transparent';
                    img.onclick = (ev) => { ev.stopPropagation(); selectAvatar(avatar); };
                    optionsDiv.appendChild(img);
                });
                document.getElementById('avatar-selector-overlay').style.display = 'flex';
                // ファイル選択イベント
                document.getElementById('avatar-file').onchange = (e) => {
                    const file = e.target.files[0];
                    if (file) {
                        const reader = new FileReader();
                        reader.onload = (event) => selectAvatar(event.target.result);
                        reader.readAsDataURL(file);
                    }
                };
            }

            window.closeAvatarSelector = function() {
                document.getElementById('avatar-selector-overlay').style.display = 'none';
            }

            window.selectAvatar = function(avatar) {
                const roomId = document.getElementById('room-id').value;
                if (roomId && currentUserId) {
                    set(ref(db, 'rooms/' + roomId + '/users/' + currentUserId + '/avatar'), avatar);
                }
                closeAvatarSelector();
            }

            window.editUserName = function(el) {
                const avatarDiv = el?.closest('.user-avatar');
                if (!avatarDiv) return;
                avatarDiv.dataset.editing = 'true';
                const nameDiv = avatarDiv.querySelector('.user-tooltip .user-name');
                if (!nameDiv) return;
                const currentName = nameDiv.textContent;
                const input = document.createElement('input');
                input.type = 'text';
                input.value = currentName;
                input.style.width = '100%';
                input.style.boxSizing = 'border-box';
                input.onblur = () => {
                    setTimeout(() => {
                        const newName = input.value.trim();
                        if (newName && newName !== currentName) {
                            const roomId = document.getElementById('room-id').value;
                            if (roomId && currentUserId) {
                                set(ref(db, 'rooms/' + roomId + '/users/' + currentUserId + '/name'), newName);
                            }
                        }
                        nameDiv.textContent = newName || currentName;
                        avatarDiv.dataset.editing = 'false';
                    }, 100);
                };
                input.onkeydown = (e) => {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        input.blur();
                    }
                };
                nameDiv.textContent = '';
                nameDiv.appendChild(input);
                input.focus();
            }

            window.onload = function() {
                if (localStorage.getItem('darkMode') === 'on') toggleDarkMode();
                const savedColor = localStorage.getItem('themeColor');
                if (savedColor) changeThemeColor(savedColor);
                // 常に起動時はモード選択を優先（オンライン/オフライン選択画面を最初に出す）
                document.getElementById('mode-selector-overlay').style.display = 'flex';
                document.getElementById('room-login-overlay').style.display = 'none';
                // スマートフォン検知
                if (/Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)) {
                    document.getElementById('mobile-warning').style.display = 'block';
                }
            };

            window.chooseModeAndStart = function(mode) {
                document.getElementById('mode-selector-overlay').style.display = 'none';
                localStorage.setItem('currentMode', mode);
                if (document.querySelector(`input[name="mode"][value="${mode}"]`)) {
                    document.querySelector(`input[name="mode"][value="${mode}"]`).checked = true;
                }
                setMode(mode);
            };

            window.toggleModeSelector = function() {
                document.getElementById('settings-modal-overlay').style.display = 'none';
                document.getElementById('mode-selector-overlay').style.display = 'flex';
            };

            window.changeThemeColor = function(color) {
                document.documentElement.style.setProperty('--main-color', color);
                localStorage.setItem('themeColor', color);
                document.getElementById('colorPicker').value = color;
            }

            window.toggleDarkMode = function() {
                document.body.classList.toggle('dark-mode');
                localStorage.setItem('darkMode', document.body.classList.contains('dark-mode') ? 'on' : 'off');
            }

            window.normalizeColor = function(rawColor) {
                if (!rawColor || typeof rawColor !== 'string') return '#dddddd';
                if (/^#([0-9a-fA-F]{3})$/.test(rawColor)) {
                    const r = rawColor[1];
                    const g = rawColor[2];
                    const b = rawColor[3];
                    return `#${r}${r}${g}${g}${b}${b}`.toLowerCase();
                }
                if (/^#([0-9a-fA-F]{6})$/.test(rawColor)) {
                    return rawColor.toLowerCase();
                }
                return '#dddddd';
            }

            window.addForm = function(num = '', memo = '', label = '', color = '', afterTarget = null, skipCalculate = false) {
                const area = document.getElementById("input-area");
                const div = document.createElement("div");
                div.className = "input-row";
                div.draggable = true;
                const labelText = label || `No.${area.children.length + 1}`;
                const rowColor = normalizeColor(color || (document.body.classList.contains('dark-mode') ? '#444' : '#ddd'));
                div.style.backgroundColor = rowColor + "33";
                div.innerHTML = `
                    <input type="color" class="row-color-picker" value="${rowColor}" oninput="setTimeout(() => updateRowColor(this), 100)">
                    <input type="text" class="label-in" value="${labelText}" oninput="debouncedSaveData()" style="background-color:${rowColor}33; color:${rowColor}; border-bottom:2px solid ${rowColor} !important;">
                    <input type="number" class="num-in" value="${num}" style="border-color:${rowColor}" placeholder="0" oninput="debouncedSaveData()">
                    <input type="text" class="memo-in" value="${memo}" style="border-color:${rowColor}" placeholder="メモ" oninput="debouncedSaveData()">
                    <button class="row-btn btn-copy" onclick="copyThisRow(this)">❐</button>
                    <button class="row-btn btn-del" onclick="removeThisRow(this)">✕</button>
                `;
                const inputs = div.querySelectorAll('input');
                inputs.forEach(input => {
                    input.draggable = false;
                    input.addEventListener('focus', () => { div.draggable = false; });
                    input.addEventListener('blur', () => { div.draggable = true; });
                });
                const buttons = div.querySelectorAll('button');
                buttons.forEach(button => {
                    button.addEventListener('touchstart', (e) => e.stopPropagation(), { passive: true });
                    button.addEventListener('pointerdown', (e) => e.stopPropagation());
                });
                div.ondragstart = (e) => {
                    if (e.target.closest('input') || e.target.closest('button')) {
                        e.preventDefault();
                        return false;
                    }
                    draggedItem = div;
                    afterElement = null;
                    if (!placeholder) {
                        placeholder = document.createElement('div');
                        placeholder.style.height = '2px';
                        placeholder.style.background = 'rgba(0,0,0,0.3)';
                        placeholder.style.margin = '0';
                        placeholder.style.border = 'none';
                    }
                    div.style.opacity = '0.4';
                };
                div.ondragover = e => { 
                    e.preventDefault(); 
                    afterElement = getDragAfterElement(area, e.clientY, '.input-row'); 
                    if (placeholder.parentNode) placeholder.parentNode.removeChild(placeholder);
                    if (!afterElement) {
                        area.appendChild(placeholder);
                    } else {
                        area.insertBefore(placeholder, afterElement);
                    }
                };
                div.ondrop = e => { 
                    e.preventDefault(); 
                    if (placeholder.parentNode) placeholder.parentNode.removeChild(placeholder);
                    if (!afterElement) area.appendChild(draggedItem); else area.insertBefore(draggedItem, afterElement); 
                };
                div.ondragend = () => { 
                    draggedItem = null; 
                    afterElement = null; 
                    if (placeholder.parentNode) placeholder.parentNode.removeChild(placeholder);
                    div.style.opacity = '1'; 
                    saveLogOrder ? saveLogOrder() : saveData(); 
                };
                if (afterTarget) area.insertBefore(div, afterTarget.nextSibling); else area.appendChild(div);
                if (!skipCalculate) calculateAll(false);
            }

            window.updateRowColor = function(picker) {
                const row = picker.parentElement;
                const color = normalizeColor(picker.value);
                picker.value = color;
                row.style.backgroundColor = color + "33";
                const lbl = row.querySelector('.label-in');
                lbl.style.backgroundColor = color + "33"; lbl.style.color = color; lbl.style.borderBottomColor = color;
                row.querySelector('.num-in').style.borderColor = color; row.querySelector('.memo-in').style.borderColor = color;
                debouncedSaveData();
            }

            window.copyThisRow = function(btn) {
                const row = btn.parentElement;
                addForm(row.querySelector(".num-in").value, row.querySelector(".memo-in").value, row.querySelector(".label-in").value + "(複)", row.querySelector(".row-color-picker").value, row);
                calculateAll(false);
            }

            window.removeThisRow = function(btn) {
                const area = document.getElementById("input-area");
                if (area.children.length > 1) { btn.parentElement.remove(); calculateAll(false); }
            }

            window.getDragAfterElement = function(container, y, selector) {
                const elements = [...container.querySelectorAll(selector)].filter(el => el !== draggedItem);
                return elements.reduce((closest, child) => {
                    const box = child.getBoundingClientRect(), offset = y - box.top - box.height / 2;
                    if (offset < 0 && offset > closest.offset) return { offset: offset, element: child };
                    else return closest;
                }, { offset: Number.NEGATIVE_INFINITY, element: null }).element;
            }

            window.calculateAll = function(isSave = true) {
                const rows = Array.from(document.querySelectorAll(".input-row"));
                let nums = [], details = [];
                rows.forEach(row => {
                    const n = parseFloat(row.querySelector(".num-in").value), m = row.querySelector(".memo-in").value, l = row.querySelector(".label-in").value, c = row.querySelector(".row-color-picker").value;
                    if (!isNaN(n)) { nums.push(n); }
                    details.push({ label: l, num: isNaN(n) ? 0 : n, memo: m, color: c });
                });
                if (nums.length === 0) return resetDisplay();
                const total = nums.reduce((a,b)=>a+b,0);
                document.getElementById("total-result").innerText = total.toLocaleString();
                document.getElementById("count-result").innerText = nums.length;
                document.getElementById("min-result").innerText = Math.min(...nums).toLocaleString();
                document.getElementById("max-result").innerText = Math.max(...nums).toLocaleString();
                saveData();
                if (isSave) {
                    const logs = JSON.parse(localStorage.getItem('proCalcV15_logs')) || [];
                    logs.unshift({ id: Date.now(), time: new Date().toLocaleString(), total: total.toLocaleString(), details: details, title: "" });
                    localStorage.setItem('proCalcV15_logs', JSON.stringify(logs));
                    if (currentMode === 'online' && isOnlineConnected && !isRendering) {
                        const roomId = document.getElementById('room-id').value;
                        if (roomId) {
                            set(ref(db, 'rooms/' + roomId + '/logs'), logs);
                        }
                    }
                    refreshLogList();
                }
            }

            window.refreshLogList = function() {
                const list = document.getElementById("log-list"), logs = JSON.parse(localStorage.getItem('proCalcV15_logs')) || [];
                list.innerHTML = "";
                logs.forEach(log => {
                    const container = document.createElement("div");
                    container.className = "log-item-container"; container.draggable = true; container.dataset.id = log.id;
                    const detailText = log.details.map(d => `<div style="border-left:4px solid ${d.color}; padding-left:5px; margin-bottom:3px;">・${d.label}: <b>${d.num.toLocaleString()}</b> <small>(${d.memo || '-'})</small></div>`).join('');
                    container.innerHTML = `
                        <div class="log-controls">
                            <button class="log-btn log-load-btn" onclick="confirmAction('履歴を復元しますか？', () => loadLogData(${log.id}))">復元</button>
                            <button class="log-btn log-del-btn" onclick="confirmAction('この履歴を消去しますか？', () => deleteLog(${log.id}))">×</button>
                        </div>
                        <input type="text" class="log-entry-title" value="${log.title || ''}" placeholder="履歴タイトル" oninput="updateLogTitle(${log.id}, this.value)">
                        <div class="log-summary" onclick="toggleLogDetails(this)"><span>${log.time}</span><span>Total: <b>${log.total}</b> <span class="arrow">▲</span></span></div>
                        <div class="log-details">${detailText}</div>
                    `;
                    container.ondragstart = (e) => { 
                        if(e.target.tagName === 'INPUT' || e.target.tagName === 'BUTTON') return e.preventDefault(); 
                        draggedLog = container; 
                        afterLogElement = null; 
                        if (!placeholder) {
                            placeholder = document.createElement('div');
                            placeholder.style.height = '2px';
                            placeholder.style.background = 'rgba(0,0,0,0.3)';
                            placeholder.style.margin = '0';
                            placeholder.style.border = 'none';
                        }
                        container.classList.add('dragging'); 
                    };
                    container.ondragend = () => { 
                        draggedLog = null; 
                        afterLogElement = null; 
                        if (placeholder.parentNode) placeholder.parentNode.removeChild(placeholder);
                        container.classList.remove('dragging'); 
                        saveLogOrder(); 
                    };
                    list.ondragover = e => { 
                        e.preventDefault(); 
                        afterLogElement = getDragAfterElement(list, e.clientY, '.log-item-container'); 
                        if (placeholder.parentNode) placeholder.parentNode.removeChild(placeholder);
                        if (!afterLogElement) {
                            list.appendChild(placeholder);
                        } else {
                            list.insertBefore(placeholder, afterLogElement);
                        }
                    };
                    list.ondrop = e => { 
                        e.preventDefault(); 
                        if (placeholder.parentNode) placeholder.parentNode.removeChild(placeholder);
                        if (!afterLogElement) list.appendChild(draggedLog); else list.insertBefore(draggedLog, afterLogElement); 
                    };
                    list.appendChild(container);
                });
            }

            window.loadLogData = function(id) {
                const logs = JSON.parse(localStorage.getItem('proCalcV15_logs')) || [], target = logs.find(log => log.id === id);
                if(target) { 
                    document.getElementById("input-area").innerHTML = ""; 
                    target.details.forEach((d, index) => {
                        const num = isNaN(d.num) ? '' : d.num;
                        const isLast = index === target.details.length - 1;
                        addForm(num, d.memo, d.label, d.color, null, !isLast);
                    }); 
                    calculateAll(false); 
                    window.scrollTo(0,0); 
                }
            }

            window.saveLogsToFirebase = function(logs) {
                if (currentMode === 'online' && isOnlineConnected) {
                    const roomId = document.getElementById('room-id').value;
                    if (roomId) {
                        set(ref(db, 'rooms/' + roomId + '/logs'), logs);
                    }
                }
            }

            window.saveLogOrder = function() {
                const list = document.getElementById("log-list"), ids = Array.from(list.querySelectorAll('.log-item-container')).map(el => parseInt(el.dataset.id)), logs = JSON.parse(localStorage.getItem('proCalcV15_logs')) || [];
                const orderedLogs = ids.map(id => logs.find(l => l.id === id));
                localStorage.setItem('proCalcV15_logs', JSON.stringify(orderedLogs));
                saveLogsToFirebase(orderedLogs);
            };

            window.toggleLogDetails = function(sum) { const det = sum.nextElementSibling, arr = sum.querySelector('.arrow'); det.classList.toggle('show'); arr.innerText = det.classList.contains('show') ? '▼' : '▲'; }
            window.updateLogTitle = function(id, v) { let logs = JSON.parse(localStorage.getItem('proCalcV15_logs')) || []; const idx = logs.findIndex(l => l.id === id); if (idx !== -1) { logs[idx].title = v; localStorage.setItem('proCalcV15_logs', JSON.stringify(logs)); saveLogsToFirebase(logs); } }
            window.deleteLog = function(id) { 
                let logs = JSON.parse(localStorage.getItem('proCalcV15_logs')) || []; 
                logs = logs.filter(l => l.id !== id); 
                localStorage.setItem('proCalcV15_logs', JSON.stringify(logs)); 
                saveLogsToFirebase(logs); 
                refreshLogList(); 
            }
            window.resetInputsOnly = function() { document.getElementById("input-area").innerHTML = ""; addForm(); resetDisplay(); saveData(); }
            window.sortRows = function(asc) { const area = document.getElementById("input-area"), rows = Array.from(area.children); rows.sort((a,b) => (parseFloat(a.querySelector(".num-in").value)||0) - (parseFloat(b.querySelector(".num-in").value)||0)); if(!asc) rows.reverse(); rows.forEach(r => area.appendChild(r)); saveData(); }
            window.renumberLabels = function() { document.querySelectorAll(".label-in").forEach((l, i) => { l.value = `No.${i + 1}`; updateRowColor(l.parentElement.querySelector('.row-color-picker')); }); saveData(); }
            window.resetDisplay = function() { document.getElementById("total-result").innerText = "0"; document.getElementById("count-result").innerText = "0"; document.getElementById("min-result").innerText = "-"; document.getElementById("max-result").innerText = "-"; }

            window.generateRandomName = function() {
                const adjectives = ['Cool', 'Smart', 'Happy', 'Brave', 'Quick', 'Calm', 'Bold', 'Wise', 'Kind', 'Fast'];
                const nouns = ['Tiger', 'Eagle', 'Wolf', 'Bear', 'Lion', 'Fox', 'Owl', 'Hawk', 'Cat', 'Dog'];
                return adjectives[Math.floor(Math.random() * adjectives.length)] + ' ' + nouns[Math.floor(Math.random() * nouns.length)];
            }

            window.generateRandomAvatar = function() {
                return avatarOptions[Math.floor(Math.random() * avatarOptions.length)];
            }

            window.renderUserList = function() {
                const userList = document.getElementById('user-list');
                userList.innerHTML = '';
                const userIds = Object.keys(users);
                const maxDisplay = 4;
                const hasMore = userIds.length > maxDisplay;
                
                // 最初のmaxDisplayユーザーを表示
                userIds.slice(0, maxDisplay).forEach(userId => {
                    addUserAvatar(userId, userList);
                });

                // 余ったユーザーがあれば「...」ボタンを追加
                if (hasMore) {
                    const moreBtn = document.createElement('div');
                    moreBtn.className = 'user-more-btn';
                    moreBtn.textContent = '...';
                    moreBtn.onclick = (e) => {
                        e.stopPropagation();
                        openUserListModal();
                    };
                    userList.appendChild(moreBtn);
                }
            }

            window.addUserAvatar = function(userId, userList) {
                const user = users[userId];
                if (!user) return;
                const avatarDiv = document.createElement('div');
                avatarDiv.className = 'user-avatar' + (userId === currentUserId ? ' self' : '');
                avatarDiv.innerHTML = `
                    <img src="${user.avatar}" alt="${user.name}" style="width:100%; height:100%; border-radius:50%;">
                    <div class="user-tooltip">
                        <div class="avatar-detail">
                            <img src="${user.avatar}" alt="${user.name}">
                            ${userId === currentUserId ? '<div class="camera-icon" onclick="event.stopPropagation();openAvatarSelector()">📷</div>' : ''}
                        </div>
                        <div class="edit-name">
                            <div class="user-name">${user.name}</div>
                            ${userId === currentUserId ? '<div class="pencil-icon" onclick="event.stopPropagation();editUserName(this)">✏️</div>' : ''}
                        </div>
                    </div>
                `;
                let hideTimeout;
                const tooltip = avatarDiv.querySelector('.user-tooltip');

                avatarDiv.addEventListener('mouseenter', () => {
                    clearTimeout(hideTimeout);
                    if (tooltip) tooltip.style.display = 'block';
                });

                avatarDiv.addEventListener('mouseleave', () => {
                    if (avatarDiv.dataset.editing === 'true') return;
                    hideTimeout = setTimeout(() => {
                        if (tooltip) tooltip.style.display = 'none';
                    }, 150);
                });

                if (tooltip) {
                    tooltip.addEventListener('mouseenter', () => {
                        clearTimeout(hideTimeout);
                        tooltip.style.display = 'block';
                    });
                    tooltip.addEventListener('mouseleave', () => {
                        if (avatarDiv.dataset.editing === 'true') return;
                        hideTimeout = setTimeout(() => {
                            tooltip.style.display = 'none';
                        }, 150);
                    });
                    tooltip.addEventListener('click', (e) => {
                        e.stopPropagation();
                    });
                }

                userList.appendChild(avatarDiv);
            }

            window.openUserListModal = function() {
                const content = document.getElementById('user-list-content');
                content.innerHTML = '';
                Object.keys(users).forEach(userId => {
                    const user = users[userId];
                    const userItem = document.createElement('div');
                    userItem.style.cssText = 'text-align: center; padding: 10px; border-radius: 8px; background: rgba(0,0,0,0.02); position: relative;';
                    userItem.innerHTML = `
                        <img src="${user.avatar}" alt="${user.name}" style="width: 60px; height: 60px; border-radius: 30px; margin-bottom: 8px; border: 2px solid ${userId === currentUserId ? '#ff0000' : 'var(--main-color)'};"/>
                        <div style="font-weight: bold; font-size: 14px; color: var(--text-dark);">${user.name}</div>
                        ${userId === currentUserId ? '<div style="font-size: 12px; color: #999; margin-top: 4px;"><small>(自分)</small></div>' : ''}
                    `;
                    content.appendChild(userItem);
                });
                document.getElementById('user-list-modal-overlay').style.display = 'flex';
            }

            window.closeUserListModal = function() {
                document.getElementById('user-list-modal-overlay').style.display = 'none';
            }
        </script>
    </body>
</html>
